# Nixpacks configuration for multi-language project (Node.js + Python)

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "cd backend && pip install --upgrade pip && pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cp -r frontend/build backend/static"
]

[start]
cmd = "cd backend && python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
