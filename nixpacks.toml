# Nixpacks configuration for Railway monorepo deployment
# Builds both frontend (Node) and backend (Python)

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = [
    "cd frontend && npm ci",
    "cd backend && pip install --break-system-packages -r requirements.txt"
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
    "cp -r frontend/build backend/static"
]

[start]
cmd = "cd backend && python3 -m alembic upgrade head && python3 -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
